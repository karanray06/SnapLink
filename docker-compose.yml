version: '3.8'

services:
  # --- MUMBAI REGION (Primary) ---
  postgres-mumbai:
    image: postgres:16-alpine
    container_name: snaplink_postgres_mumbai
    restart: always
    environment:
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: urlshortener
    networks:
      - snaplink-net
    ports:
      - "5432:5432"
    volumes:
      - postgres_mumbai_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U urlshortener -d urlshortener" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-mumbai:
    image: redis:7-alpine
    container_name: snaplink_redis_mumbai
    restart: always
    command: [ "redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru" ]
    networks:
      - snaplink-net
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-mumbai:
    build:
      context: ./backend
    container_name: snaplink_backend_mumbai
    restart: always
    environment:
      DATABASE_URL: postgresql://urlshortener:strongpassword123@postgres-mumbai:5432/urlshortener?sslmode=disable
      REDIS_URL: redis://redis-mumbai:6379
      PORT: 3001
      BASE_URL: http://localhost
      NODE_ENV: production
      REGION: mumbai
    networks:
      - snaplink-net
    volumes:
      - ./migrations:/app/migrations
    depends_on:
      postgres-mumbai:
        condition: service_healthy
      redis-mumbai:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health" ]
      interval: 15s
      timeout: 10s
      retries: 3

  # --- SINGAPORE REGION (Failover/Replica) ---
  postgres-singapore:
    image: postgres:16-alpine
    container_name: snaplink_postgres_singapore
    restart: always
    environment:
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: urlshortener
    networks:
      - snaplink-net
    ports:
      - "5433:5432"
    volumes:
      - postgres_singapore_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U urlshortener -d urlshortener" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-singapore:
    image: redis:7-alpine
    container_name: snaplink_redis_singapore
    restart: always
    command: [ "redis-server", "--replicaof", "redis-mumbai", "6379" ]
    networks:
      - snaplink-net
    ports:
      - "6380:6379"
    depends_on:
      redis-mumbai:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-singapore:
    build:
      context: ./backend
    container_name: snaplink_backend_singapore
    restart: always
    environment:
      DATABASE_URL: postgresql://urlshortener:strongpassword123@postgres-singapore:5432/urlshortener?sslmode=disable
      REDIS_URL: redis://redis-singapore:6379
      PORT: 3001
      BASE_URL: http://localhost
      NODE_ENV: production
      REGION: singapore
    networks:
      - snaplink-net
    volumes:
      - ./migrations:/app/migrations
    depends_on:
      postgres-singapore:
        condition: service_healthy
      redis-singapore:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health" ]
      interval: 15s
      timeout: 10s
      retries: 3

  # --- GLOBAL TRAFFIC MANAGER (Nginx) ---
  frontend:
    build:
      context: ./frontend
    container_name: snaplink_frontend
    restart: always
    networks:
      - snaplink-net
    depends_on:
      - backend-mumbai
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1/" ]
      interval: 15s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: snaplink_nginx
    restart: always
    networks:
      - snaplink-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-mumbai:
        condition: service_healthy
      backend-singapore:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health" ]
      interval: 15s
      timeout: 10s
      retries: 3

networks:
  snaplink-net:
    driver: bridge

volumes:
  postgres_mumbai_data:
  postgres_singapore_data:
