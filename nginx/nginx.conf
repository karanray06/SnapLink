worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging configuration
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  off; # Disable access log for performance, or use buffered logging
    error_log   /var/log/nginx/error.log warn;

    # Performance Tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer Sizes
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Gzip Compression
    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s; # Increased for Enterprise
    limit_req_zone $binary_remote_addr zone=redirect_limit:20m rate=500r/s;

    upstream backend_servers {
        server snaplink_backend_mumbai:3001 max_fails=3 fail_timeout=10s;
        server snaplink_backend_singapore:3001 backup;
        keepalive 64; # Increased keepalive
    }

    upstream frontend_servers {
        server snaplink_frontend:80;
        keepalive 32;
    }

    server {
        # Note: HTTP/2 usually requires SSL/TLS. In local dev/Docker, we might stay with 1.1 or use a dummy cert.
        # But let's configure it as if we were heading to Prod.
        listen 80;
        # listen 443 ssl http2; # In Prod
        
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # ── Health Check ──
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
        }

        # ── API Routes → Backend ──
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Proxy Buffering Tuning
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── Short URL Redirects → Backend ──
        location ~ "^/([A-Za-z0-9\-_]{3,12})$" {
            limit_req zone=redirect_limit burst=100 nodelay;

            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend Assets (Vite) ──
        location /assets/ {
            proxy_pass http://frontend_servers;
            expires 1y;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # ── React Landing Page / Dashboard ──
        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
